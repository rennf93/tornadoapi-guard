name: Docs Update
on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'SECURITY.md'
      - 'CHANGELOG.md'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Send Initial Slack Message
      #   id: send_initial_slack_docs
      #   uses: rennf93/good-comms@master
      #   with:
      #     SLACK_WEBHOOK: '${{ secrets.SLACK_WEBHOOK }}'
      #     SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
      #     STATUS: 'Started'
      #     CHANNEL_ID: '${{ secrets.SLACK_CHANNEL }}'
      #     AUTHOR_NAME: 'TornadoAPI Guard - Docs Update'
      #     AUTHOR_LINK: 'https://github.com/rennf93/tornadoapi-guard'
      #     AUTHOR_ICON: ':books:'
      #     TITLE: 'Docs Update Started'
      #     TITLE_LINK: 'https://github.com/rennf93/tornadoapi-guard/actions'
      #     MESSAGE: |
      #       .
      #       *DOCS UPDATE TRIGGERED!*
      #       .
      #       Commit:
      #         ${{ github.event.head_commit.message }}
      #       .
      #     COLOR: warning

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install "mkdocstrings[python]"
          pip install mike
          pip install pymarkdownlnt
          pip install -e .

      - name: Lint documentation
        run: |
          pymarkdownlnt scan -r -e ./.venv -e ./.git -e ./.github -e ./data -e ./tornadoapi_guard -e ./tests .

      - name: Configure Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Deploy documentation
        run: |
          mike deploy --push latest
          mike set-default --push latest

      - name: Deploy to GitHub Pages
        run: |
          mike list
          git push origin gh-pages --force

